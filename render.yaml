databases:
  - name: smart-attendance-db
    databaseName: smart_attendance
    user: smart_attendance_user
    plan: free

services:
  - type: web
    name: smart-attendance-backend
    runtime: java
    plan: free
    rootDir: smart-attendance-backend
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/smart-attendance-1.0.0.jar
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JDBC_DATABASE_URL
        fromDatabase:
          name: smart-attendance-db
          property: jdbcConnectionString
      - key: JDBC_DATABASE_USERNAME
        fromDatabase:
          name: smart-attendance-db
          property: user
      - key: JDBC_DATABASE_PASSWORD
        fromDatabase:
          name: smart-attendance-db
          property: password
      - key: APP_JWT_SECRET
        generateValue: true
