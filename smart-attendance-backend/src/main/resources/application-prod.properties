# ── Production Profile (Render) ──────────────────────────────────────────────
# Render injects DATABASE_URL as: postgres://user:pass@host:port/dbname
# Spring needs jdbc:postgresql:// format, handled via JDBC_DATABASE_URL below.
spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.username=${JDBC_DATABASE_USERNAME}
spring.datasource.password=${JDBC_DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Disable H2 console in production
spring.h2.console.enabled=false

# CORS — will be overridden by CORS_ALLOWED_ORIGINS env var on Render
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://smart-attendance-frontend-blue.vercel.app,https://smart-attendance-push.vercel.app,https://smart-attendance-frontend.vercel.app}
